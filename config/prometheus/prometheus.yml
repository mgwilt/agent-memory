global:
  scrape_interval: 15s

scrape_configs:
  # Memgraph emits OpenMetrics on its private Compose service address.
  # The host port is bound to 127.0.0.1 for local development only.
  - job_name: memgraph
    metrics_path: /metrics
    static_configs:
      - targets:
          - memgraph:9091

  # The Rust API exposes Prometheus text at /metrics in the Compose network.
  - job_name: nestor
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
