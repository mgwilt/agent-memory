pre-commit:
  parallel: false
  commands:
    fmt:
      run: cargo fmt --all --check
    check:
      run: cargo check --workspace --all-targets
    clippy:
      run: cargo clippy --workspace --all-targets -- -D warnings
    test:
      run: cargo test --workspace
    python-lint:
      run: uv run --locked ruff check scripts
    python-format:
      run: uv run --locked ruff format --check scripts
    python-typecheck:
      run: uv run --locked ty check scripts
    python-test:
      run: uv run --locked python -m unittest discover -s scripts -p '*_test.py'
    rust-coverage:
      glob: "crates/*/src/**/*.rs"
      run: uv run --locked python scripts/check_rust_coverage.py --staged
